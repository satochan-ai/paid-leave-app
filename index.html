<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有給休暇管理アプリ - ログイン</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="page-login">

  <div class="login-container">
    <h1 class="login-title">有給休暇管理アプリ</h1>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="example@example.com">
      </div>

      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="パスワードを入力">
      </div>

      <div id="loginError" class="alert alert-error" style="display:none;"></div>

      <button type="submit" class="btn btn-primary btn-block">ログイン</button>
    </form>
    <p class="prototype-note">このアプリはlocalStorageを使用したプロトタイプです。本番運用にはバックエンド認証・DB管理が必要です。</p>
  </div>

  <script src="assets/js/storage.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/seed.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/routerGuard.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initLoginPage);
  </script>
</body>
</html>
