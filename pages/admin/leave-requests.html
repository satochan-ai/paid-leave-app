<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有給申請一覧 - 有給休暇管理アプリ</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>

  <header class="header">
    <span class="header-title">有給休暇管理アプリ</span>
    <div class="header-user">
      <span id="headerUserName"></span>
      <button class="btn btn-outline btn-sm" data-action="logout">ログアウト</button>
    </div>
  </header>

  <nav class="sidebar">
    <ul class="sidebar-nav">
      <li><a href="dashboard.html">ダッシュボード</a></li>
      <li><a href="employees.html">社員一覧</a></li>
      <li><a href="employee-form.html">社員追加</a></li>
      <li><a href="leave-requests.html" class="active">有給申請一覧</a></li>
    </ul>
  </nav>

  <main class="main-wrapper">
    <div class="page-content">

      <div class="page-header">
        <div>
          <h2>有給申請一覧</h2>
          <p class="page-description">社員からの有給申請を確認し、承認または却下できます。</p>
        </div>
        <a href="dashboard.html" class="btn btn-outline btn-sm">← ダッシュボード</a>
      </div>

      <!-- CSV出力 -->
      <div class="csv-button-group" style="margin-bottom:12px;">
        <button class="btn btn-secondary btn-sm" onclick="exportLeaveRequestsCsv()">有給申請履歴CSV</button>
      </div>

      <!-- ステータスフィルター -->
      <div class="toolbar" style="margin-bottom:16px;">
        <label for="requestStatusFilter" style="font-size:13px; color:#374151;">ステータス絞り込み：</label>
        <select id="requestStatusFilter" class="form-control" style="max-width:160px;">
          <option value="all">すべて</option>
          <option value="pending">申請中</option>
          <option value="approved">承認済み</option>
          <option value="rejected">却下</option>
          <option value="cancelled">取消</option>
        </select>
      </div>

      <!-- 申請一覧テーブル -->
      <div class="table-wrapper">
        <table class="table leave-request-table">
          <thead>
            <tr>
              <th>申請日</th>
              <th>社員名</th>
              <th>メールアドレス</th>
              <th>取得希望日</th>
              <th>取得日数</th>
              <th>申請理由</th>
              <th>ステータス</th>
              <th>処理日</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="leaveRequestTableBody"></tbody>
        </table>
      </div>

    </div>
  </main>

  <script src="../../assets/js/storage.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/seed.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/routerGuard.js"></script>
  <script src="../../assets/js/leaveCalculator.js"></script>
  <script src="../../assets/js/leaveService.js"></script>
  <script src="../../assets/js/employeeService.js"></script>
  <script src="../../assets/js/leaveRequestService.js"></script>
  <script src="../../assets/js/validation.js"></script>
  <script src="../../assets/js/csvService.js"></script>
  <script src="../../assets/js/backupService.js"></script>
  <script src="../../assets/js/app.js"></script>
  <script>
    requireAdmin();
    initializeApp();
    renderLeaveRequestsPage();
  </script>
</body>
</html>
