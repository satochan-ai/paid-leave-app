<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード - 有給休暇管理アプリ</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/pages.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>

  <header class="header">
    <span class="header-title">有給休暇管理アプリ</span>
    <div class="header-user">
      <span id="headerUserName"></span>
      <button class="btn btn-outline btn-sm" data-action="logout">ログアウト</button>
    </div>
  </header>

  <nav class="sidebar">
    <ul class="sidebar-nav">
      <li><a href="dashboard.html" class="active">ダッシュボード</a></li>
      <li><a href="employees.html">社員一覧</a></li>
    </ul>
  </nav>

  <main class="main-wrapper">
    <div class="page-content">

      <div class="page-header">
        <h2>ダッシュボード</h2>
      </div>

      <!-- KPIカード -->
      <div class="dashboard-stats" id="statsContainer"></div>

      <!-- クイックリンク -->
      <div class="quick-links">
        <a href="employees.html" class="btn btn-primary">社員一覧へ</a>
        <a href="employee-form.html" class="btn btn-outline">社員追加へ</a>
      </div>

      <!-- 有給付与チェック -->
      <section class="section grant-check-section">
        <h3 class="section-title">有給付与チェック</h3>
        <p class="section-desc">入社日と現在日をもとに、付与されているべき有給休暇を確認し、不足分を自動付与します。</p>
        <button class="btn btn-primary btn-sm" onclick="handleGenerateLeaveGrantsForAll()">全社員の付与チェックを実行</button>
        <div id="grantCheckResult" class="grant-check-result" style="margin-top:16px;"></div>
      </section>

      <!-- CSV出力 -->
      <section class="section">
        <h3 class="section-title">CSV出力</h3>
        <div class="csv-button-group">
          <button class="btn btn-secondary btn-sm" onclick="exportEmployeesCsv()">社員一覧CSV</button>
          <button class="btn btn-secondary btn-sm" onclick="exportLeaveSummaryCsv()">有給残日数CSV</button>
          <button class="btn btn-secondary btn-sm" onclick="exportLeaveUsagesCsv()">有給取得履歴CSV</button>
        </div>
      </section>

      <!-- 失効予定アラート -->
      <section class="section">
        <h3 class="section-title">失効予定が近い社員（30日以内）</h3>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>社員名</th>
                <th>失効予定日</th>
                <th>失効予定日数</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="expiringTableBody"></tbody>
          </table>
        </div>
      </section>

      <!-- データ管理（バックアップ/復元） -->
      <section class="section data-management-section">
        <h3 class="section-title">データ管理</h3>
        <p class="section-desc">localStorageに保存された有給管理データをJSON形式でバックアップ・復元できます。</p>
        <div id="backupMessage" class="backup-message" style="display:none;"></div>
        <div class="backup-actions">
          <div class="backup-action-block">
            <div class="backup-action-label">バックアップ</div>
            <button class="btn btn-secondary btn-sm" id="backupDownloadBtn">バックアップをダウンロード</button>
          </div>
          <div class="backup-action-block">
            <div class="backup-action-label">復元</div>
            <div class="backup-restore-row">
              <input type="file" id="backupFileInput" class="file-input" accept=".json,application/json">
              <button class="btn btn-warning btn-sm" id="backupRestoreBtn">バックアップを復元</button>
            </div>
          </div>
        </div>
      </section>

      <!-- デモデータ初期化 -->
      <div class="danger-zone">
        <div class="danger-zone-title">デモデータ管理</div>
        <div class="danger-zone-desc">現在の登録データを削除し、初期デモデータに戻します。デモ・開発時のみ使用してください。</div>
        <button class="btn btn-danger btn-sm" onclick="resetDemoData()">デモデータ初期化</button>
      </div>

    </div>
  </main>

  <script src="../../assets/js/storage.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/seed.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/routerGuard.js"></script>
  <script src="../../assets/js/leaveCalculator.js"></script>
  <script src="../../assets/js/leaveService.js"></script>
  <script src="../../assets/js/employeeService.js"></script>
  <script src="../../assets/js/validation.js"></script>
  <script src="../../assets/js/csvService.js"></script>
  <script src="../../assets/js/backupService.js"></script>
  <script src="../../assets/js/app.js"></script>
  <script>
    requireAdmin();
    initializeApp();
    renderAdminDashboard();
    bindBackupRestoreActions();
  </script>
</body>
</html>
